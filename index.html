<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳本</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8A04A">
  <link rel="icon" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── TOKENS ── */
  :root {
    --cream:   #FAF7F2;
    --sand:    #F0E6D3;
    --amber:   #E8A04A;
    --orange:  #D4682A;
    --brown:   #6B3E1F;
    --bark:    #3D1F0A;
    --income:  #5A8A5E;
    --expense: #C0442B;
    --card-bg: rgba(255,255,255,0.72);
    --shadow:  0 2px 16px rgba(61,31,10,0.10);
    --radius:  16px;
    --font-display: 'Georgia', serif;
    --font-body:    system-ui, -apple-system, sans-serif;
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: var(--font-body);
    background: linear-gradient(160deg, var(--cream) 0%, var(--sand) 55%, #E8C99A 100%);
    min-height: 100dvh;
    color: var(--bark);
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: rgba(250,247,242,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(107,62,31,0.12);
  }
  .topbar-title {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: bold;
    color: var(--brown);
    letter-spacing: .04em;
  }
  .sync-status {
    display: inline-block;
    margin-left: 12px;
    font-size: .82rem;
    color: #6B3E1F;
    background: rgba(232,160,74,0.14);
    padding: 4px 10px;
    border-radius: 999px;
    vertical-align: middle;
  }
  .burger {
    width: 36px; height: 36px;
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center; gap: 5px;
    padding: 4px;
  }
  .burger span {
    display: block; height: 2px; border-radius: 2px;
    background: var(--brown);
    transition: transform .28s, opacity .2s;
  }
  .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .burger.open span:nth-child(2) { opacity: 0; }
  .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── DRAWER ── */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(61,31,10,0.35);
    opacity: 0; pointer-events: none;
    transition: opacity .28s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; top: 0; right: -280px; z-index: 95;
    width: 260px; height: 100dvh;
    background: linear-gradient(180deg, #FAF3E8 0%, #F0E0C4 100%);
    box-shadow: -4px 0 32px rgba(61,31,10,0.18);
    padding: 72px 24px 32px;
    transition: right .28s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column; gap: 6px;
  }
  .drawer.open { right: 0; }
  .drawer-label {
    font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--amber); font-weight: 700; margin: 16px 0 6px;
  }
  .drawer a {
    display: block; padding: 10px 12px;
    border-radius: 10px; color: var(--brown);
    font-weight: 600; font-size: .95rem;
    text-decoration: none; cursor: pointer;
    transition: background .15s;
  }
  .drawer a:hover, .drawer a.active { background: rgba(232,160,74,0.22); color: var(--orange); }

  /* ── MAIN ── */
  main { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }

  /* ── SECTION TABS ── */
  .tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
    overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 8px 18px;
    border: none; border-radius: 24px; cursor: pointer;
    font-size: .88rem; font-weight: 600;
    background: rgba(107,62,31,0.10); color: var(--brown);
    transition: background .18s, color .18s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--amber), var(--orange));
    color: #fff;
  }

  /* ── MONTH SELECTOR ── */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .month-nav h2 {
    font-family: var(--font-display);
    font-size: 1.1rem; color: var(--brown);
  }
  .month-nav button {
    background: none; border: none; cursor: pointer;
    font-size: 1.3rem; color: var(--amber); padding: 4px 10px;
    border-radius: 8px; transition: background .15s;
  }
  .month-nav button:hover { background: rgba(232,160,74,0.18); }

  /* ── SUMMARY CARDS ── */
  .summary-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .sum-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 14px 12px;
    box-shadow: var(--shadow);
    text-align: center;
    backdrop-filter: blur(8px);
  }
  .sum-card .label {
    font-size: .7rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--amber);
    font-weight: 700; margin-bottom: 4px;
  }
  .sum-card .amount {
    font-family: var(--font-display);
    font-size: 1.05rem; font-weight: bold;
  }
  .sum-card .amount.inc { color: var(--income); }
  .sum-card .amount.exp { color: var(--expense); }
  .sum-card .amount.bal { color: var(--brown); }

  /* ── WEEKLY STRIPS ── */
  .week-block { margin-bottom: 18px; }
  .week-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 4px; margin-bottom: 8px;
    border-bottom: 1.5px solid rgba(107,62,31,0.14);
  }
  .week-header .week-label {
    font-size: .78rem; font-weight: 700;
    color: var(--orange); letter-spacing: .05em;
  }
  .week-header .week-bal {
    font-size: .82rem; font-weight: 700; font-family: var(--font-display);
  }
  .week-header .week-bal.pos { color: var(--income); }
  .week-header .week-bal.neg { color: var(--expense); }

  /* ── RECORD ITEM ── */
  .record-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card-bg);
    border-radius: 12px; padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 8px rgba(61,31,10,0.07);
    backdrop-filter: blur(6px);
    transition: transform .15s;
  }
  .record-item:active { transform: scale(.98); }
  .record-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .record-icon.inc { background: rgba(90,138,94,0.15); }
  .record-icon.exp { background: rgba(192,68,43,0.12); }
  .record-info { flex: 1; min-width: 0; }
  .record-title {
    font-weight: 600; font-size: .92rem; color: var(--bark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .record-meta {
    font-size: .74rem; color: #9B7355; margin-top: 2px;
  }
  .record-amount {
    font-family: var(--font-display);
    font-size: 1rem; font-weight: bold; flex-shrink: 0;
  }
  .record-amount.inc { color: var(--income); }
  .record-amount.exp { color: var(--expense); }
  .del-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: #C4A882; padding: 4px;
    border-radius: 6px; transition: color .15s, background .15s;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--expense); background: rgba(192,68,43,0.10); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 40px 20px;
    color: #B09070; font-size: .9rem;
  }
  .empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }

  /* ── SORT BAR ── */
  .sort-bar {
    display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
  }
  .sort-bar span { font-size: .78rem; color: #9B7355; }
  .sort-select {
    border: 1.5px solid rgba(107,62,31,0.20);
    border-radius: 8px; padding: 5px 10px;
    background: var(--card-bg); color: var(--brown);
    font-size: .82rem; cursor: pointer; outline: none;
  }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 28px; right: 22px; z-index: 80;
    width: 58px; height: 58px; border-radius: 50%;
    background: linear-gradient(135deg, var(--amber) 0%, var(--orange) 100%);
    border: none; cursor: pointer; color: #fff; font-size: 1.7rem;
    box-shadow: 0 4px 20px rgba(212,104,42,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform .18s, box-shadow .18s;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(212,104,42,0.55); }
  .fab:active { transform: scale(.95); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(61,31,10,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%; max-width: 500px;
    background: linear-gradient(180deg, #FDF9F3 0%, #F5E8D2 100%);
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -8px 40px rgba(61,31,10,0.18);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 {
    font-family: var(--font-display);
    font-size: 1.1rem; color: var(--brown); margin-bottom: 20px;
  }
  .modal-tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .modal-tab {
    flex: 1; padding: 9px;
    border: 2px solid rgba(107,62,31,0.15);
    border-radius: 12px; background: none; cursor: pointer;
    font-weight: 700; font-size: .9rem; color: var(--brown);
    transition: all .18s;
  }
  .modal-tab.inc.active { background: rgba(90,138,94,0.15); border-color: var(--income); color: var(--income); }
  .modal-tab.exp.active { background: rgba(192,68,43,0.10); border-color: var(--expense); color: var(--expense); }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: .78rem; font-weight: 700;
    color: var(--amber); letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid rgba(107,62,31,0.18);
    border-radius: 10px; background: rgba(255,255,255,0.65);
    color: var(--bark); font-size: .95rem; outline: none;
    transition: border-color .18s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--amber);
    background: #fff;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    border: 1.5px solid rgba(107,62,31,0.20);
    border-radius: 12px; background: none; cursor: pointer;
    color: var(--brown); font-size: .95rem; font-weight: 600;
  }
  .btn-save {
    flex: 2; padding: 12px;
    border: none; border-radius: 12px; cursor: pointer;
    background: linear-gradient(135deg, var(--amber), var(--orange));
    color: #fff; font-size: .95rem; font-weight: 700;
    box-shadow: 0 3px 14px rgba(212,104,42,0.35);
  }

  /* ── CHARTS SECTION ── */
  .chart-card {
    background: var(--card-bg);
    border-radius: var(--radius); padding: 18px 16px;
    box-shadow: var(--shadow); margin-bottom: 18px;
    backdrop-filter: blur(8px);
  }
  .chart-title {
    font-size: .78rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--amber); margin-bottom: 14px;
  }
  canvas { max-height: 220px; }

  /* ── LAPTOP ── */
  @media (min-width: 600px) {
    main { padding: 28px 24px 80px; }
    .summary-row { gap: 14px; }
    .sum-card .amount { font-size: 1.15rem; }
    .modal-overlay { align-items: center; }
    .modal { border-radius: 20px; padding: 32px 28px 36px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div>
    <span class="topbar-title">📒 帳本</span>
    <span class="sync-status" id="pendingCount">待同步 0 筆</span>
  </div>
  <button class="burger" id="burgerBtn" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-label">頁面</div>
  <a class="active" data-tab="records">📋 記帳紀錄</a>
  <a data-tab="charts">📊 統計圖表</a>
  <div class="drawer-label">操作</div>
  <a id="exportLink">📥 匯出資料 (CSV)</a>
  <a id="openModalLink">＋ 新增記錄</a>
  <a id="clearAllLink">🗑 清除全部</a>
</nav>

<!-- MAIN -->
<main>
  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="records">📋 紀錄</button>
    <button class="tab-btn" data-tab="charts">📊 圖表</button>
  </div>

  <!-- ── RECORDS PAGE ── -->
  <section id="page-records">
    <div class="month-nav">
      <button type="button">‹</button>
      <h2 id="monthLabel"></h2>
      <button type="button">›</button>
    </div>

    <div class="summary-row">
      <div class="sum-card">
        <div class="label">收入</div>
        <div class="amount inc" id="sumIncome">$0</div>
      </div>
      <div class="sum-card">
        <div class="label">支出</div>
        <div class="amount exp" id="sumExpense">$0</div>
      </div>
      <div class="sum-card">
        <div class="label">結餘</div>
        <div class="amount bal" id="sumBalance">$0</div>
      </div>
    </div>

    <div class="sort-bar">
      <span>排序</span>
      <select class="sort-select" id="sortSelect" onchange="renderRecords()">
        <option value="date-desc">日期（新→舊）</option>
        <option value="date-asc">日期（舊→新）</option>
        <option value="amount-desc">金額（高→低）</option>
        <option value="amount-asc">金額（低→高）</option>
      </select>
    </div>

    <div id="recordsList"></div>
  </section>

  <!-- ── CHARTS PAGE ── -->
  <section id="page-charts" style="display:none">
    <div class="month-nav">
      <button type="button">‹</button>
      <h2 id="monthLabelChart"></h2>
      <button type="button">›</button>
    </div>
    <div class="chart-card">
      <div class="chart-title">支出分類佔比</div>
      <canvas id="pieChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">每週收支對比</div>
      <canvas id="barChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">月度收支趨勢</div>
      <canvas id="lineChart"></canvas>
    </div>
  </section>
</main>


<!-- FAB -->
<button class="fab" aria-label="新增記錄">＋</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>新增記錄</h3>
    <div class="modal-tabs">
      <button class="modal-tab exp active" id="tabExp" type="button">支出</button>
      <button class="modal-tab inc" id="tabInc" type="button">收入</button>
    </div>
    <div class="field">
      <label>金額</label>
      <input type="number" id="inputAmount" placeholder="0" min="0" inputmode="decimal">
    </div>
    <div class="field">
      <label>分類</label>
      <select id="inputCategory"></select>
    </div>
    <div class="field">
      <label>備註</label>
      <input type="text" id="inputNote" placeholder="選填">
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="inputDate">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" type="button">取消</button>
      <button class="btn-save" type="button">儲存</button>
    </div>
  </div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
